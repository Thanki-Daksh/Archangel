# Archangel — Where information is collected
# Each source must have an id, type, and enabled flag.
# Collectors read this file to know which channels to monitor.

sources:
  - id: reddit_automation
    type: reddit
    subreddits: ["automation", "Python", "nocode", "smallbusiness", "entrepreneur"]
    query: "need help automation"
    max_results: 10
    enabled: true

  - id: reddit_forhire
    type: reddit
    subreddits: ["forhire", "freelance", "forhire"]
    query: "looking for developer"
    max_results: 10
    enabled: true

  - id: reddit_webdev
    type: reddit
    subreddits: ["webdev", "web_design", "flask", "django"]
    query: "help needed build"
    max_results: 10
    enabled: true
